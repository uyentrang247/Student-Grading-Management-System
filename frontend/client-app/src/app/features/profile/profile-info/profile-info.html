<div class="info-section">
  <div class="info-row">
    <label>Tên đăng nhập:</label>
    <span>{{ profile.username }}</span>
  </div>
  <div class="info-row">
    <label>Họ và tên:</label>
    <span>{{ profile.fullName }}</span>
  </div>
  <div class="info-row">
    <label>Email:</label>
    <span>{{ profile.email }}</span>
  </div>
  
  <div class="info-row" *ngIf="profile.role !== 'Admin'">
    <label>Khoa:</label>
    <span>{{ profile.facultyName || 'Chưa có' }}</span>
  </div>
  
  <div class="info-row">
    <label>Vai trò:</label>
    <span class="role-badge" [class.admin]="profile.role === 'Admin'">{{ getRoleDisplayName() }}</span>
  </div>
  
  <div class="action-buttons">
    <button class="btn-edit" (click)="onEdit()">
      <i class="fas fa-edit me-2"></i>Chỉnh sửa
    </button>
    <button class="btn-change-password" (click)="onChangePassword()">
      <i class="fas fa-key me-2"></i>Đổi mật khẩu
    </button>
  </div>
</div>
