<div class="modal-overlay" *ngIf="isOpen" (click)="onClose()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h3><i class="fas fa-key me-2"></i>Đổi mật khẩu</h3>
      <button class="modal-close" (click)="onClose()">&times;</button>
    </div>
    <div class="modal-body">
      <div class="form-group password-group">
        <label>Mật khẩu cũ <span class="required">*</span></label>
        <div class="password-input-wrapper">
          <input [type]="showPassword.current ? 'text' : 'password'" 
                 [(ngModel)]="passwordForm.currentPassword" 
                 class="form-control" placeholder="Nhập mật khẩu cũ"
                 [class.is-invalid]="passwordError.currentPassword">
          <button type="button" class="password-toggle" (click)="togglePasswordVisibility('current')">
            <i class="fas" [class.fa-eye]="showPassword.current" [class.fa-eye-slash]="!showPassword.current"></i>
          </button>
        </div>
        <div class="invalid-feedback" *ngIf="passwordError.currentPassword">
          {{ passwordError.currentPassword }}
        </div>
      </div>

      <div class="form-group password-group">
        <label>Mật khẩu mới <span class="required">*</span></label>
        <div class="password-input-wrapper">
          <input [type]="showPassword.new ? 'text' : 'password'" 
                 [(ngModel)]="passwordForm.newPassword" 
                 class="form-control" placeholder="Tối thiểu 6 ký tự"
                 [class.is-invalid]="passwordError.newPassword">
          <button type="button" class="password-toggle" (click)="togglePasswordVisibility('new')">
            <i class="fas" [class.fa-eye]="showPassword.new" [class.fa-eye-slash]="!showPassword.new"></i>
          </button>
        </div>
        <div class="invalid-feedback" *ngIf="passwordError.newPassword">
          {{ passwordError.newPassword }}
        </div>
      </div>

      <div class="form-group password-group">
        <label>Xác nhận mật khẩu mới <span class="required">*</span></label>
        <div class="password-input-wrapper">
          <input [type]="showPassword.confirm ? 'text' : 'password'" 
                 [(ngModel)]="passwordForm.confirmPassword" 
                 class="form-control" placeholder="Nhập lại mật khẩu mới"
                 [class.is-invalid]="passwordError.confirmPassword">
          <button type="button" class="password-toggle" (click)="togglePasswordVisibility('confirm')">
            <i class="fas" [class.fa-eye]="showPassword.confirm" [class.fa-eye-slash]="!showPassword.confirm"></i>
          </button>
        </div>
        <div class="invalid-feedback" *ngIf="passwordError.confirmPassword">
          {{ passwordError.confirmPassword }}
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" (click)="onClose()">Hủy</button>
      <button class="btn-save" (click)="onChangePassword()">Lưu</button>
    </div>
  </div>
</div>
