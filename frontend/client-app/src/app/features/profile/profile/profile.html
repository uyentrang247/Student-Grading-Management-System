<div class="profile-container">
  <div class="profile-card">
    <div class="profile-header">
      <div class="avatar">
        <i class="fas fa-user-circle fa-4x"></i>
      </div>
      <h2>Hồ sơ cá nhân</h2>
      <p *ngIf="profile">{{ getRoleDisplayName() }}</p>
    </div>

    <div *ngIf="profile && !isLoading" class="profile-body">
      <div *ngIf="successMessage" class="alert alert-success">
        <i class="fas fa-check-circle me-2"></i> {{ successMessage }}
      </div>
      <div *ngIf="errorMessage" class="alert alert-danger">
        <i class="fas fa-exclamation-circle me-2"></i> {{ errorMessage }}
      </div>

      <!-- Hiển thị thông tin -->
      <app-profile-info 
        *ngIf="!isEditing"
        [profile]="profile"
        (edit)="onEdit()"
        (changePassword)="openChangePassword()">
      </app-profile-info>

      <!-- Form chỉnh sửa -->
      <app-profile-edit 
        *ngIf="isEditing"
        [profile]="profile"
        (save)="onSaveProfile($event)"
        (cancel)="onCancelEdit()">
      </app-profile-edit>
    </div>

    <div *ngIf="isLoading" class="loading text-center py-5">
      <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden">Loading...</span>
      </div>
      <p class="mt-2 text-muted">Đang tải thông tin...</p>
    </div>
  </div>

  <!-- Modal đổi mật khẩu -->
  <app-change-password 
    [isOpen]="isChangingPassword"
    (close)="closeChangePassword()"
    (success)="onChangePasswordSuccess($event)"
    (error)="onChangePasswordError($event)">
  </app-change-password>
</div>
