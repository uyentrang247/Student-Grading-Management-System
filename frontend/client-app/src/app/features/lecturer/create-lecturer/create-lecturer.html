<div class="lecturer-form-container">
  <h2>Thêm Giảng Viên Mới</h2>
  <form (ngSubmit)="onSubmit()" #lecturerForm="ngForm">
    <div class="row">
      <div class="col-md-6">
        <div class="input-group">
          <label>Tên đăng nhập</label>
          <input type="text" [(ngModel)]="lecturer.username" name="username" placeholder="Nhập username..." required>
        </div>
      </div>
      <div class="col-md-6">
        <div class="input-group">
          <label>Họ và Tên</label>
          <input type="text" [(ngModel)]="lecturer.fullName" name="fullName" placeholder="Nhập họ tên..." required>
        </div>
      </div>
    </div>

    <div class="input-group">
      <label>Email liên hệ</label>
      <input type="email" [(ngModel)]="lecturer.email" name="email" placeholder="example@qnu.edu.vn" required>
    </div>

    <div class="input-group">
      <label>Khoa trực thuộc</label>
      <select [(ngModel)]="lecturer.facultyId" name="facultyId" required>
        <option [ngValue]="0" disabled>-- Chọn khoa --</option>
        <option *ngFor="let f of faculties" [ngValue]="f.facultyId || f.FacultyId">
          {{ f.facultyName || f.FacultyName }}
        </option>
      </select>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn-submit" [disabled]="isLoading">
        {{ isLoading ? 'Đang lưu...' : 'Lưu thông tin giảng viên' }}
      </button>
      <button type="button" class="btn-cancel" routerLink="/admin/lecturers" [disabled]="isLoading">
        Quay lại danh sách
      </button>
    </div>
  </form>
</div>
