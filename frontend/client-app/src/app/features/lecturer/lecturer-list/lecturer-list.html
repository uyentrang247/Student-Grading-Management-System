<div class="lecturer-list-container module-card">
  <div class="qnu-card-header">
    <h2 class="form-title">Danh sách Giảng viên</h2>
    <button class="btn-add-qnu" routerLink="/admin/lecturers/create">
      + Thêm giảng viên mới
    </button>
  </div>

  <div class="card-body p-0">
    <table class="qnu-table">
      <thead>
        <tr>
          <th>Mã GV</th>
          <th>Họ và Tên</th>
          <th>Email</th>
          <th>Khoa trực thuộc</th>
          <th>Hành động</th>
        </tr>
      </thead>
      <tbody>
        @for (gv of lecturers; track gv.userId) {
          <tr>
            <td>{{ gv.username }}</td>
            <td>{{ gv.fullName }}</td>
            <td>{{ gv.email }}</td>
            <td>{{ gv.facultyName }}</td>
            <td>
              <div class="btn-actions-cell">
                <button class="btn-qnu-edit" [routerLink]="['/admin/lecturers/edit', gv.userId]">Sửa</button>
                <button class="btn-qnu-delete" (click)="deleteLecturer(gv.userId)">Xóa</button>
              </div>
            </td>
          </tr>
        } @empty {
          <tr>
            <td colspan="5" class="empty-message">
              Danh sách giảng viên đang trống!
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</div>
