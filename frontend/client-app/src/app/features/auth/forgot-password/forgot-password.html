<div class="forgot-container">
  <div class="forgot-card">
    <h2>Quên mật khẩu</h2>
    <p class="subtitle">Vui lòng nhập email liên kết với tài khoản để lấy lại quyền truy cập</p>
    
    <form (ngSubmit)="onSubmit()" #forgotForm="ngForm">
      <div class="form-group">
        <label for="email">Email đăng ký</label>
        <input 
          type="email" 
          id="email" 
          name="email" 
          [(ngModel)]="email" 
          required 
          class="form-control"
          placeholder="Nhập email hệ thống của bạn"
        />
      </div>
      
      <button type="submit" [disabled]="!forgotForm.form.valid || isLoading" class="btn-submit">
        {{ isLoading ? 'ĐANG XỬ LÝ...' : 'ĐĂNG NHẬP LẠI BẰNG EMAIL' }}
      </button>
    </form>

    <div *ngIf="message" class="alert alert-success">
      <p>{{ message }}</p>
      <p *ngIf="tempPass">Mật khẩu tạm thời: <strong class="highlight-pass">{{ tempPass }}</strong></p>
    </div>

    <div *ngIf="errorMessage" class="alert alert-danger">
      {{ errorMessage }}
    </div>

    <div class="back-to-login">
      <a routerLink="/login">Quay lại Đăng nhập</a>
    </div>
  </div>
</div>
