<div class="auth-container">
  <div class="module-card auth-card">
    <div class="qnu-card-header">
      <h3 class="form-title">QUÊN MẬT KHẨU</h3>
    </div>
    <div class="auth-card-body">
      <p class="subtitle">Nhập email của bạn để nhận mã OTP xác thực hệ thống</p>
      
      <div class="form-group">
        <label>Email liên kết</label>
        <input type="email" [(ngModel)]="email" placeholder="example@qnu.edu.vn" [disabled]="isLoading">
      </div>

      <button class="btn-qnu-primary" (click)="requestOtp()" [disabled]="isLoading">
        <span *ngIf="!isLoading">Gửi Mã OTP</span>
        <span *ngIf="isLoading" class="spinner"></span>
      </button>

      <div class="back-link">
        <a href="/login">Quay lại đăng nhập</a>
      </div>
    </div>
  </div>
</div>
