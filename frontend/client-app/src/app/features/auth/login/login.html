<div class="auth-page">
  <div class="container d-flex justify-content-center">
    <div class="auth-card">
      <div class="auth-cover d-none d-md-flex">
        <div class="brand-circle">
          <i class="fas fa-university fs-1" style="color: #162a52;"></i>
        </div>
        <h3 class="fw-bold mb-2" style="letter-spacing: 1px;">EduGrade</h3>
        <h6 class="mb-4" style="color: #ff9800;">Quy Nhon University</h6>
        <p style="color: #c0cde5; font-size: 14px; line-height: 1.6;">Hệ thống quản lý đào tạo và điểm tín chỉ hiện đại, tối ưu hóa trải nghiệm người dùng.</p>
      </div>

      <div class="auth-form-wrap">
        <div class="mb-4 text-center">
          <h4 class="fw-bold" style="color: #162a52;">Đăng nhập hệ thống</h4>
          <p class="text-muted" style="font-size: 14px;">Vui lòng nhập thông tin tài khoản để tiếp tục</p>
        </div>

        <form [formGroup]="loginForm" (ngSubmit)="onLogin()">
          <div *ngIf="errorMessage" class="text-danger mb-3" style="font-size: 13px;">
            <i class="fas fa-exclamation-circle me-1"></i> {{ errorMessage }}
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold" style="color: #3b4d75; font-size: 13px;">Tên đăng nhập</label>
            <input type="text" formControlName="UsernameOrEmail" class="form-control" placeholder="Tên đăng nhập">
            <span *ngIf="loginForm.get('UsernameOrEmail')?.invalid && loginForm.get('UsernameOrEmail')?.touched" class="text-danger" style="font-size: 12px;">
              Vui lòng nhập tài khoản
            </span>
          </div>

          <div class="mb-4">
            <div class="d-flex justify-content-between align-items-center mb-1">
              <label class="form-label fw-semibold mb-0" style="color: #3b4d75; font-size: 13px;">Mật khẩu</label>
              <a routerLink="/forgot-password" style="color: #ff9800; font-size: 12px; text-decoration: none;" class="forgot-link" >Quên mật khẩu?</a>
            </div>
            <div class="input-group">
              <input [type]="showPassword ? 'text' : 'password'" formControlName="Password" class="form-control"  />
              <span class="input-group-text" (click)="togglePassword()">
                <i class="fas" [ngClass]="showPassword ? 'fa-eye-slash' : 'fa-eye'"></i>
              </span>
            </div>
            <span *ngIf="loginForm.get('Password')?.invalid && loginForm.get('Password')?.touched" class="text-danger" style="font-size: 12px;">
              Vui lòng nhập mật khẩu
            </span>
          </div>

          <button type="submit" class="btn-login mb-4">ĐĂNG NHẬP</button>
        </form>
      </div>
    </div>
  </div>
</div>
