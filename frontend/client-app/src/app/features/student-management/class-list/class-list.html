<div class="container">
  <div class="header-section">
    <div class="title-wrapper">
      <span class="icon-layer">🔶</span>
      <h2>Danh Sách Lớp Học Phần Quản Lý</h2>
    </div>
    <div class="title-underline"></div>
  </div>

  <div class="toolbar-section">
    <div class="filter-box">
      <span class="filter-icon">⏳</span>
      <select 
        [(ngModel)]="selectedSemesterId" 
        (change)="onSemesterChange()" 
        class="semester-select">
        <option [ngValue]="0">-- Hiển thị tất cả --</option>
        <option *ngFor="let sem of semesters" [ngValue]="sem.semesterId">
          Học kỳ {{ sem.term }} — Năm học {{ sem.academicYear }}
        </option>
      </select>
    </div>
  </div>

  <div class="table-responsive">
    <table class="qnu-table">
      <thead>
        <tr>
          <th>Mã Lớp Học Phần</th>
          <th>Tên Môn Học</th>
          <th class="text-center">Số Tín Chỉ</th>
          <th>Học Kỳ / Năm Học</th>
          <th class="text-right">Hành động</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngIf="classes.length === 0">
          <td colspan="5" class="text-center no-data">
            Không có lớp học phần nào trong học kỳ được chọn.
          </td>
        </tr>

        <tr *ngFor="let cls of classes">
          <td class="font-bold class-code">{{ cls.classCode }}</td>
          <td>{{ cls.subjectName }}</td>
          <td class="text-center">
            <span class="badge-credits">{{ cls.credits }} TC</span>
          </td>
          <td>Học kỳ {{ cls.semester }} — Năm học {{ cls.academicYear }}</td>
          <td class="text-right">
            <button 
              (click)="viewClassDetail(cls.id!)" 
              class="btn-action btn-students">
              👥 Sinh viên
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
