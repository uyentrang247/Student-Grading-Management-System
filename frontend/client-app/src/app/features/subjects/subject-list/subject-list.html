<div class="card module-card shadow-sm">

  <div class="card-header qnu-card-header d-flex justify-content-between align-items-center">

    <h5 class="header-title mb-0">
      DANH SÁCH MÔN HỌC
    </h5>

    <a
      routerLink="/subjects/create"
      class="btn btn-create">

      + Thêm môn học

    </a>

  </div>

  <div class="card-body p-0">

    <table class="table qnu-table table-hover mb-0">

      <thead>

        <tr>
          <th>Mã môn</th>
          <th>Tên môn</th>
          <th>Tín chỉ</th>
          <th>Quá trình</th>
          <th>Cuối kỳ</th>
          <th width="160">Thao tác</th>
        </tr>

      </thead>

      <tbody>

        <tr *ngFor="let subject of subjects">

          <td class="code-text">
            {{ subject.subjectCode }}
          </td>

          <td>{{ subject.subjectName }}</td>

          <td>{{ subject.credits }}</td>

          <td>{{ subject.processWeight }}%</td>

          <td>{{ subject.finalWeight }}%</td>

          <td>

            <div class="action-buttons">

              <a
                class="btn-action btn-edit text-decoration-none"
                [routerLink]="['/subjects/edit', subject.id]">

                Sửa

              </a>

              <button
                class="btn-action btn-delete"
                (click)="deleteSubject(subject.id!)">

                Xóa

              </button>

            </div>

          </td>

        </tr>

      </tbody>

    </table>

  </div>

</div>
