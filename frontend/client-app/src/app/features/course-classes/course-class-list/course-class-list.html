<div class="card module-card shadow-sm">

  <div class="card-header qnu-card-header d-flex justify-content-between align-items-center">

    <h5 class="header-title mb-0">
      DANH SÁCH LỚP HỌC PHẦN
    </h5>

    <a
      routerLink="/course-classes/create"
      class="btn btn-create">

      + Thêm lớp học phần

    </a>

  </div>

  <div class="card-body p-3 border-bottom">

    <input
      type="text"
      class="form-control search-box"
      placeholder="Tìm theo mã lớp, môn học, giảng viên..."
      [(ngModel)]="searchKeyword"
      (input)="filterCourseClasses()"
    />

  </div>

  <div class="card-body p-0">

    <table class="table qnu-table table-hover mb-0">

      <thead>

        <tr>
          <th>Mã lớp</th>
          <th>Môn học</th>
          <th>Giảng viên</th>
          <th>Học kỳ</th>
          <th>Năm học</th>
          <th width="160">Thao tác</th>
        </tr>

      </thead>

      <tbody>

        <tr *ngFor="let courseClass of courseClasses">

          <td class="code-text">
            {{ courseClass.classCode }}
          </td>

          <td>{{ courseClass.subjectName }}</td>

          <td>{{ courseClass.lecturerName }}</td>

          <td>{{ courseClass.semester }}</td>

          <td>{{ courseClass.academicYear }}</td>

          <td>

            <div class="action-buttons">

              <a
                class="btn-action btn-edit text-decoration-none"
                [routerLink]="['/course-classes/edit', courseClass.id]">

                Sửa

              </a>

              <button
                class="btn-action btn-delete"
                (click)="deleteCourseClass(courseClass.id!)">

                Xóa

              </button>

            </div>

          </td>

        </tr>

      </tbody>

    </table>

  </div>

</div>
