<div class="card module-card shadow-sm">
  <div class="card-header qnu-card-header">
    <h5 class="form-title mb-0">THÔNG TIN LỚP HỌC PHẦN</h5>
  </div>

  <div class="card-body">
    <div class="row">
      <div class="col-md-6 mb-3">
        <label class="form-label">Mã lớp học phần</label>
        <input type="text" class="form-control qnu-input" placeholder="VD: WEB101-01" [(ngModel)]="courseClass.classCode" />
      </div>

      <div class="col-md-6 mb-3">
        <label class="form-label">Môn học</label>
        <select class="form-select qnu-input" [(ngModel)]="courseClass.subjectId">
          <option [ngValue]="0">-- Chọn môn học --</option>
          
          <option *ngFor="let subject of subjects" [ngValue]="subject.subjectId">
            {{ subject.subjectName }}
          </option>
        </select>
      </div>
    </div>

    <div class="row">
      <div class="col-md-6 mb-3">
        <label class="form-label">Giảng viên</label>
        <select class="form-select qnu-input" [(ngModel)]="courseClass.lecturerId">
          <option [ngValue]="0">-- Chọn giảng viên --</option>

          <option *ngFor="let lecturer of lecturers" [ngValue]="lecturer.id">
            {{ lecturer.name }}
          </option>
        </select>
      </div>

      <div class="col-md-6 mb-3">
        <label class="form-label">Học kỳ</label>
        <select class="form-select qnu-input" [(ngModel)]="courseClass.semesterId">
          <option [ngValue]="0">-- Chọn học kỳ --</option>
          
          <option *ngFor="let semester of semesters" [ngValue]="semester.id">
            {{ semester.name }}
          </option>
        </select>
      </div>
    </div>

    <div class="form-actions">
      <button type="button" class="btn-save" (click)="saveCourseClass()">Lưu lớp học phần</button>
      <a routerLink="/course-classes" class="btn-back text-decoration-none">Quay lại</a>
    </div>
  </div>
</div>
