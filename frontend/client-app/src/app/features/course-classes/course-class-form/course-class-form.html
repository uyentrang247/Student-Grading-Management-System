<div class="container-fluid">
  <div class="card">
    <div class="card-header">
      <h3>Thêm lớp học phần</h3>
    </div>

    <div class="card-body">
      <div class="mb-3">
        <label>Mã lớp học phần</label>
        <input
          type="text"
          class="form-control"
          placeholder="VD: WEB101-01"
          [(ngModel)]="courseClass.classCode"
        />
      </div>

      <div class="mb-3">
        <label>Môn học</label>
        <select
          class="form-control"
          [(ngModel)]="courseClass.subjectName"
        >
          <option value="">-- Chọn môn học --</option>
          <option value="Công nghệ Web">Công nghệ Web</option>
          <option value="Lập trình Java">Lập trình Java</option>
          <option value="Cơ sở dữ liệu">Cơ sở dữ liệu</option>
          <option value="Phân tích thiết kế hệ thống">Phân tích thiết kế hệ thống</option>
        </select>
      </div>

      <div class="mb-3">
        <label>Giảng viên</label>
        <select
          class="form-control"
          [(ngModel)]="courseClass.lecturerName"
        >
          <option value="">-- Chọn giảng viên --</option>
          <option value="Nguyễn Thị Loan">Nguyễn Thị Loan</option>
          <option value="Trần Thị Liên">Trần Thị Liên</option>
          <option value="Vũ Sơn Lâm">Vũ Sơn Lâm</option>
        </select>
      </div>

      <div class="mb-3">
        <label>Học kỳ</label>
        <select
          class="form-control"
          [(ngModel)]="courseClass.semester"
        >
          <option value="">-- Chọn học kỳ --</option>
          <option value="HK1">HK1</option>
          <option value="HK2">HK2</option>
          <option value="HK3">HK3</option>
        </select>
      </div>

      <div class="mb-3">
        <label>Năm học</label>
        <select
          class="form-control"
          [(ngModel)]="courseClass.academicYear"
        >
          <option value="">-- Chọn năm học --</option>
          <option value="2025-2026">2025-2026</option>
          <option value="2026-2027">2026-2027</option>
          <option value="2027-2028">2027-2028</option>
        </select>
      </div>

      <div class="mb-3">
        <label>Sĩ số tối đa</label>
        <input
          type="number"
          class="form-control"
          min="1"
          max="200"
          placeholder="VD: 40"
          [(ngModel)]="courseClass.maxStudents"
        />
      </div>

      <button
        class="btn btn-primary"
        (click)="saveCourseClass()"
      >
        Lưu lớp học phần
      </button>
    </div>
  </div>
</div>
