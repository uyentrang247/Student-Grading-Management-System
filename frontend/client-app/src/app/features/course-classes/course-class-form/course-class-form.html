<div class="card module-card shadow-sm">

  <div class="card-header qnu-card-header">

    <h5 class="form-title mb-0">
      THÔNG TIN LỚP HỌC PHẦN
    </h5>

  </div>

  <div class="card-body">

    <div class="row">

      <div class="col-md-6 mb-3">

        <label class="form-label">
          Mã lớp học phần
        </label>

        <input
          type="text"
          class="form-control qnu-input"
          placeholder="VD: WEB101-01"
          [(ngModel)]="courseClass.classCode"
        />

      </div>

      <div class="col-md-6 mb-3">

        <label class="form-label">
          Môn học
        </label>

        <select
          class="form-select qnu-input"
          [(ngModel)]="courseClass.subjectName">

          <option value="">-- Chọn môn học --</option>
          <option value="Công nghệ Web">Công nghệ Web</option>
          <option value="Lập trình Java">Lập trình Java</option>
          <option value="Cơ sở dữ liệu">Cơ sở dữ liệu</option>
          <option value="Phân tích thiết kế hệ thống">
            Phân tích thiết kế hệ thống
          </option>

        </select>

      </div>

    </div>

    <div class="row">

      <div class="col-md-6 mb-3">

        <label class="form-label">
          Giảng viên
        </label>

        <select
          class="form-select qnu-input"
          [(ngModel)]="courseClass.lecturerName">

          <option value="">-- Chọn giảng viên --</option>
          <option value="Nguyễn Thị Loan">Nguyễn Thị Loan</option>
          <option value="Trần Thị Liên">Trần Thị Liên</option>
          <option value="Vũ Sơn Lâm">Vũ Sơn Lâm</option>

        </select>

      </div>

      <div class="col-md-3 mb-3">

        <label class="form-label">
          Học kỳ
        </label>

        <select
          class="form-select qnu-input"
          [(ngModel)]="courseClass.semester">

          <option value="">-- Chọn --</option>
          <option value="HK1">HK1</option>
          <option value="HK2">HK2</option>
          <option value="HK3">HK3</option>

        </select>

      </div>

      <div class="col-md-3 mb-3">

        <label class="form-label">
          Năm học
        </label>

        <select
          class="form-select qnu-input"
          [(ngModel)]="courseClass.academicYear">

          <option value="">-- Chọn --</option>
          <option>2025-2026</option>
          <option>2026-2027</option>
          <option>2027-2028</option>

        </select>

      </div>

    </div>

    <div class="row">

      <div class="col-md-4 mb-3">

        <label class="form-label">
          Sĩ số tối đa
        </label>

        <input
          type="number"
          class="form-control qnu-input"
          [(ngModel)]="courseClass.maxStudents"
        />

      </div>

    </div>

    <div class="form-actions">

      <button
        class="btn-save"
        (click)="saveCourseClass()">

        Lưu lớp học phần

      </button>

      <a
        routerLink="/course-classes"
        class="btn-back text-decoration-none">

        Quay lại

      </a>

    </div>

  </div>

</div>
