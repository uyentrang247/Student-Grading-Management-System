<div class="modal-overlay" *ngIf="show" (click)="onClose()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h5><i class="fas fa-edit me-2"></i>Sửa điểm sinh viên</h5>
      <button class="modal-close" (click)="onClose()">&times;</button>
    </div>
    <div class="modal-body" *ngIf="student">
      <p><strong>MSSV:</strong> {{ student.studentCode }}</p>
      <p><strong>Họ tên:</strong> {{ student.fullName }}</p>
      <p><strong>Lớp:</strong> {{ student.homeroomClass }}</p>
      <hr>
      <div class="mb-3">
        <label class="form-label">Điểm quá trình (0-10)</label>
        <input type="number" class="form-control" [(ngModel)]="editProcessScore" min="0" max="10" step="0.1">
      </div>
      <div class="mb-3">
        <label class="form-label">Điểm cuối kỳ (0-10)</label>
        <input type="number" class="form-control" [(ngModel)]="editFinalScore" min="0" max="10" step="0.1">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" (click)="onClose()">Hủy</button>
      <button class="btn btn-save" (click)="onSave()" [disabled]="isSaving">
        <i class="fas" [class.fa-spinner]="isSaving" [class.fa-save]="!isSaving" [class.fa-spin]="isSaving"></i>
        {{ isSaving ? 'Đang lưu...' : 'Lưu điểm' }}
      </button>
    </div>
  </div>
</div>
