<div class="row g-3 mb-4">
  <div class="col-md-6">
    <label class="form-label fw-semibold">
      <i class="fas fa-chalkboard me-1"></i> Lớp học phần
    </label>
    <select class="form-select qnu-input" [(ngModel)]="selectedClassId" (change)="onClassChange()">
      <option value="0">-- Chọn lớp học phần --</option>
      <option *ngFor="let class of courseClasses" [value]="class.courseClassId">
        {{ class.classCode }} - {{ class.subjectName }} ({{ class.semester }} - {{ class.academicYear }})
      </option>
    </select>
  </div>

  <div class="col-md-6">
    <label class="form-label fw-semibold">
      <i class="fas fa-search me-1"></i> Tìm kiếm sinh viên
    </label>
    <div class="input-group">
      <span class="input-group-text bg-white"><i class="fas fa-user-graduate text-muted"></i></span>
      <input type="text" class="form-control qnu-input" placeholder="MSSV hoặc Họ tên" [(ngModel)]="searchKeyword" (input)="onFilter()">
      <button class="btn btn-outline-secondary" type="button" (click)="searchKeyword = ''; onFilter()" title="Xóa tìm kiếm">
        <i class="fas fa-times"></i>
      </button>
    </div>
  </div>
</div>
