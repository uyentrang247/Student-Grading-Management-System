<div class="d-flex flex-column qnu-sidebar" style="width: 250px; height: calc(100vh - 70px); position: fixed; top: 70px; left: 0; z-index: 99;">
  <div class="flex-grow-1 overflow-auto pt-3 px-3 custom-scrollbar">
    
    <div class="sidebar-heading mt-2 mb-2 px-3">HỆ THỐNG</div>
    <div class="list-group list-group-flush mb-3">
      <a href="#" class="list-group-item border-0 py-2.5 px-3 mb-1 rounded-3 custom-active d-flex align-items-center">
        <i class="fas fa-home menu-icon me-3"></i>
        <span class="fw-semibold">Trang chủ</span>
      </a>
      <a href="#" class="list-group-item border-0 py-2.5 px-3 mb-1 rounded-3 custom-hover d-flex align-items-center">
        <i class="fas fa-chalkboard-teacher menu-icon me-3"></i>
        <span class="fw-medium">Quản lý Giảng viên</span>
      </a>
    </div>

    <div class="sidebar-heading mt-3 mb-2 px-3">QUẢN LÝ ĐÀO TẠO</div>
    <div class="list-group list-group-flush mb-3">
    <a routerLink="/subjects" class="list-group-item border-0 py-2.5 px-3 mb-1 rounded-3 custom-hover d-flex align-items-center">
    <i class="fas fa-book menu-icon me-3"></i>
    <span class="fw-medium">Quản lý Môn học</span>
</a>
      <a
  routerLink="/course-classes"
  class="list-group-item border-0 py-2.5 px-3 mb-1 rounded-3 custom-hover d-flex align-items-center">
        <i class="fas fa-layer-group menu-icon me-3"></i>
        <span class="fw-medium">Lớp học phần</span>
      </a>
      <a href="#" class="list-group-item border-0 py-2.5 px-3 mb-1 rounded-3 custom-hover d-flex align-items-center">
        <i class="fas fa-user-graduate menu-icon me-3"></i>
        <span class="fw-medium">Danh sách Sinh viên</span>
      </a>
    </div>

    <div class="sidebar-heading mt-3 mb-2 px-3">NGHIỆP VỤ ĐIỂM</div>
    <div class="list-group list-group-flush mb-3">
      <a href="#" class="list-group-item border-0 py-2.5 px-3 mb-1 rounded-3 custom-hover d-flex align-items-center">
        <i class="fas fa-pen-to-square menu-icon me-3"></i>
        <span class="fw-medium">Nhập điểm</span>
      </a>
      <a href="#" class="list-group-item border-0 py-2.5 px-3 mb-1 rounded-3 custom-hover d-flex align-items-center">
        <i class="fas fa-file-invoice menu-icon me-3"></i>
        <span class="fw-medium">In bảng điểm</span>
      </a>
      <a href="#" class="list-group-item border-0 py-2.5 px-3 mb-1 rounded-3 custom-hover d-flex align-items-center">
        <i class="fas fa-rotate-left menu-icon me-3"></i>
        <span class="fw-medium">In DS học lại</span>
      </a>
    </div>

    <div class="sidebar-heading mt-3 mb-2 px-3">BÁO CÁO THỐNG KÊ</div>
    <div class="list-group list-group-flush mb-4">
      <a href="#" class="list-group-item border-0 py-2.5 px-3 mb-1 rounded-3 custom-hover d-flex align-items-center">
        <i class="fas fa-chart-line menu-icon me-3"></i>
        <span class="fw-medium">Thống kê dữ liệu</span>
      </a>
    </div>

    <div class="sidebar-heading mt-2 mb-2 px-3">TÀI KHOẢN</div>
    <div class="list-group list-group-flush">
      @if (isLoggedIn) {
        <a (click)="logout()" style="cursor: pointer;" class="list-group-item border-0 py-2.5 px-3 mb-1 rounded-3 custom-logout d-flex align-items-center">
          <i class="fas fa-sign-out-alt menu-icon me-3 text-danger"></i>
          <span class="fw-medium text-danger">Đăng xuất</span>
        </a>
      } @else {
        <a href="#" class="list-group-item border-0 py-2.5 px-3 mb-1 rounded-3 custom-login d-flex align-items-center">
          <i class="fas fa-sign-in-alt menu-icon me-3 text-success"></i>
          <span class="fw-medium text-success">Đăng nhập</span>
        </a>
      }
    </div>
    
  </div>
</div>
