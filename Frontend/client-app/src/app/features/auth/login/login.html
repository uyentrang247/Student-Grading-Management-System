<div class="login-page">

  <div class="bg-grid"></div>

  <div class="bg-light light-1"></div>
  <div class="bg-light light-2"></div>


  <div class="login-card">


    <div class="login-left">

      <a
        routerLink="/"
        class="back-link">

        <i class="fa-solid fa-arrow-left"></i>

        <span>Quay lại trang chủ</span>

      </a>

      <div class="brand">

      </div>

      <div class="left-content">

        <h1>
          EduGrade
        </h1>

        <p>
          Theo dõi điểm số, quản lý học phần và hỗ trợ giảng viên
        thao tác nhanh hơn trong mỗi học kỳ.
        </p>

      </div>

      <div class="left-footer">

      </div>

    </div>

    <div class="login-right">

      <div class="form-header">

        <h2>
          Đăng nhập
        </h2>

        <p>
          Đăng nhập để tiếp tục sử dụng hệ thống
        </p>

      </div>

      <form
        [formGroup]="loginForm"
        (ngSubmit)="onLogin()">


        <div class="form-group">

          <label>Tên đăng nhập</label>

          <div class="input-wrap">

            <i class="fa-regular fa-user"></i>

            <input
              type="text"
              formControlName="username"
              placeholder="Nhập tài khoản">

          </div>

          <small
            *ngIf="
              loginForm.get('username')?.invalid &&
              loginForm.get('username')?.touched
            ">

            Vui lòng nhập tài khoản

          </small>

        </div>


        <div class="form-group">

          <label>Mật khẩu</label>

          <div class="input-wrap">

            <i class="fa-solid fa-lock"></i>

            <input
              [type]="showPassword ? 'text' : 'password'"
              formControlName="password"
              placeholder="Nhập mật khẩu">

            <button
              type="button"
              class="toggle-btn"
              (click)="togglePassword()">

              <i
                class="fa-regular"
                [ngClass]="showPassword
                  ? 'fa-eye-slash'
                  : 'fa-eye'">
              </i>

            </button>

          </div>

          <small
            *ngIf="
              loginForm.get('password')?.invalid &&
              loginForm.get('password')?.touched
            ">

            Vui lòng nhập mật khẩu

          </small>

        </div>


        <div class="login-options">

          <label class="remember">

            <input
              type="checkbox"
              formControlName="rememberMe">

            <span>Ghi nhớ đăng nhập</span>

          </label>

          <a
            routerLink="/forgot-password"
            class="forgot-link">

            Quên mật khẩu?

          </a>

        </div>


        <button
          type="submit"
          class="login-btn">

          Đăng nhập

        </button>


        <div class="divider">

          <span>Hoặc</span>

        </div>


        <button
          type="button"
          class="google-btn"
          (click)="onGoogleLogin()">

          <svg
            class="google-logo"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 48 48">

            <path
              fill="#EA4335"
              d="M24 9.5c3.54 0 6.7 1.22 9.19 3.6l6.85-6.85C35.9 2.38 30.36 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>

            <path
              fill="#4285F4"
              d="M46.5 24.5c0-1.64-.15-3.22-.43-4.74H24v9h12.69c-.55 2.96-2.23 5.47-4.74 7.15l7.29 5.66C43.9 37.2 46.5 31.4 46.5 24.5z"/>

            <path
              fill="#FBBC05"
              d="M10.54 28.41A14.5 14.5 0 019.5 24c0-1.53.26-3 .73-4.41l-7.98-6.19A24 24 0 000 24c0 3.87.92 7.53 2.56 10.78l7.98-6.37z"/>

            <path
              fill="#34A853"
              d="M24 48c6.48 0 11.92-2.13 15.89-5.81l-7.29-5.66c-2.02 1.36-4.6 2.17-8.6 2.17-6.26 0-11.57-4.22-13.46-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>

          </svg>

          <span>Đăng nhập bằng Google</span>

        </button>


        <div class="register-text">

          Chưa có tài khoản?

          <a routerLink="/register">
            Đăng ký ngay
          </a>

        </div>

      </form>

    </div>

  </div>

</div>
