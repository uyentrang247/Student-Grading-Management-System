<div class="container mt-5">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="text-primary fw-bold mb-0">QUẢN LÝ MÔN HỌC</h2>
    <button class="btn btn-success shadow-sm" (click)="openForm(false)">
      + Thêm môn học mới
    </button>
  </div>

  <div class="card shadow border-0">
    <div class="card-header bg-dark text-white py-3">
      <h5 class="mb-0">Danh Sách Môn Học Hiện Có</h5>
    </div>
    <div class="table-responsive">
      <table class="table table-hover align-middle mb-0">
        <thead class="table-light">
          <tr>
            <th>Mã môn</th>
            <th>Tên môn</th>
            <th class="text-center">Số TC</th>
            <th class="text-center">Trọng số</th>
            <th class="text-center">Thao tác</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let s of subjects; let i = index">
            <td><strong>{{s.code}}</strong></td>
            <td>{{s.name}}</td>
            <td class="text-center">{{s.credits}}</td>
            <td class="text-center">
              <span class="badge bg-info text-dark">{{s.pw}}% - {{s.fw}}%</span>
            </td>
            <td class="text-center">
              <!-- NÚT SỬA MÀU VÀNG -->
              <button class="btn btn-outline-warning btn-sm me-2" (click)="openForm(true, i)">✏️ Sửa</button>
              <button class="btn btn-outline-danger btn-sm" (click)="deleteSubject(i)">🗑 Xóa</button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- FORM MODAL (DÙNG CHUNG CHO CẢ THÊM VÀ SỬA) -->
  <div class="modal-backdrop fade show" *ngIf="isShowingForm"></div>
  <div class="modal fade show d-block" *ngIf="isShowingForm" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content shadow-lg border-0">
        <div class="modal-header" [ngClass]="isEditing ? 'bg-warning text-dark' : 'bg-success text-white'">
          <h5 class="modal-title">{{ isEditing ? 'CHỈNH SỬA MÔN HỌC' : 'NHẬP THÔNG TIN MÔN HỌC' }}</h5>
          <button type="button" class="btn-close" (click)="closeForm()"></button>
        </div>
        <div class="modal-body p-4">
          <div class="mb-3">
            <label class="form-label fw-bold">Mã môn học</label>
            <input type="text" [(ngModel)]="newSubject.code" name="code" class="form-control">
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold">Tên môn học</label>
            <input type="text" [(ngModel)]="newSubject.name" name="name" class="form-control">
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold">Số tín chỉ</label>
            <input type="number" [(ngModel)]="newSubject.credits" name="credits" class="form-control">
          </div>
          <div class="row">
            <div class="col-6 mb-3">
              <label class="form-label fw-bold text-muted">% Quá trình</label>
              <input type="number" [(ngModel)]="newSubject.pw" name="pw" class="form-control">
            </div>
            <div class="col-6 mb-3">
              <label class="form-label fw-bold text-muted">% Cuối kỳ</label>
              <input type="number" [(ngModel)]="newSubject.fw" name="fw" class="form-control">
            </div>
          </div>
        </div>
        <div class="modal-footer bg-light">
          <button type="button" class="btn btn-secondary" (click)="closeForm()">Hủy bỏ</button>
          <button type="button" class="btn btn-primary px-4" (click)="saveSubject()">
            {{ isEditing ? 'Cập nhật ngay' : '💾 Lưu Môn Học' }}
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
